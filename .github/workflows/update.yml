name: 自动更新接口去重

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 安装依赖库
        run: |pip install lxml_html_clean requests requests-html gitpython aiohttp commentjson urllib3

      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安装依赖库
        run: |
          pip install requests requests-html gitpython aiohttp commentjson urllib3

      - name: 执行整理脚本
        run: python main.py

      - name: 提交并发布文件
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          git add .
          git commit -m "自动更新接口: $(date)" || exit 0
          git push
